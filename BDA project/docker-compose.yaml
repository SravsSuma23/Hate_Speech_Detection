services:

  # ======================= HDFS =======================
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - namenode:/hadoop/dfs
      - kaggle_cache:/kaggle
    networks:
      - hadoop

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    ports:
      - "9864:9864"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - datanode:/hadoop/dfs
    depends_on:
      - namenode
    networks:
      - hadoop

  # ======================= SPARK =======================
  spark-master:
    image: apache/spark:3.4.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_DRIVER_MEMORY=8g
      - SPARK_DRIVER_MAX_RESULT_SIZE=4g
    volumes:
      - namenode:/hadoop/dfs
    depends_on:
      - namenode
      - datanode
    networks:
      - hadoop

  spark-worker-1:
    image: apache/spark:3.4.1
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=8g
      - SPARK_EXECUTOR_MEMORY=6g
    volumes:
      - namenode:/hadoop/dfs
    depends_on:
      - spark-master
    networks:
      - hadoop

  spark-worker-2:
    image: apache/spark:3.4.1
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=8g
      - SPARK_EXECUTOR_MEMORY=6g
    volumes:
      - namenode:/hadoop/dfs
    depends_on:
      - spark-master
    networks:
      - hadoop

  # ======================= KAGGLE INGEST =======================
  kaggle-ingest:
    image: python:3.10-slim
    container_name: kaggle-ingest
    command: sleep infinity
    environment:
      - KAGGLE_CONFIG_DIR=/root/.kaggle
    volumes:
      - kaggle_cache:/kaggle
      - kaggle_config:/root/.kaggle
    depends_on:
      - namenode
    networks:
      - hadoop

  # ======================= MONGODB =======================
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hadoop

networks:
  hadoop:
    driver: bridge

volumes:
  namenode:
  datanode:
  mongo_data:
  kaggle_cache:
  kaggle_config:
